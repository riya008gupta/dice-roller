<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dice Roller Game with Images</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Dice Roller Game 🎲</h1>
    <div class="dice-container">
      <div>
        <h2>Player 1</h2>
        <img id="player1-dice" src="Dice7.png" alt="Player 1 Dice"  />
      </div>
      <div>
        <h2>Player 2</h2>
        <img id="player2-dice" src="Dice2.png" alt="Player 2 Dice"  />
      </div>
      <div>
        <h2>Player 3</h2>
        <img id="player3-dice" src="Dice3.png" alt="Player 3 Dice" />

      </div>
      <div>
        <h2>Player 4</h2>
        <img id="player4-dice" src="Dice4.png" alt="Player 1 Dice"  />
      </div>
      <div>
        <h2>Player 5</h2>
        <img id="player5-dice" src="Dice5.png" alt="Player 1 Dice"  />
      </div>
      <div>
        <h2>Player 6</h2>
        <img id="player6-dice" src="Dice6.png" alt="Player 1 Dice"  />
      </div>
    </div>
    <button id="rollBtn">Roll Dice</button>
    <p id="result"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
